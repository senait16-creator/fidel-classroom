<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidel Classroom - Teacher Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --ethio-green: #128807;
            --ethio-yellow: #FCD116;
            --ethio-red: #E8112D;
            --bg-neutral: #f8fafc;
            --card-neutral: #FFFFFF;
            --text-dark: #1e293b;
            --shadow-premium: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Ubuntu', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-neutral); 
            color: var(--text-dark); 
            padding: 24px;
        }

        .teacher-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Top Header Styling */
        header {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-premium);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--ethio-green);
        }

        header h1 { font-size: 28px; color: #0f172a; }
        header p { color: #64748b; margin-top: 4px; }

        .refresh-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: #1a252f; }

        /* Metrics Overview Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-premium);
            text-align: center;
        }
        .stat-card h3 { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { font-size: 32px; font-weight: bold; color: #0f172a; margin-top: 8px; }

        /* Student List Table Structure */
        .roster-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-premium);
            padding: 24px;
            overflow-x: auto;
        }

        .roster-card h2 { font-size: 20px; margin-bottom: 18px; color: #0f172a; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 14px;
            font-size: 14px;
            color: #475569;
            font-weight: 700;
        }

        td {
            padding: 16px 14px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
            vertical-align: middle;
        }

        .student-profile-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .student-name {
            font-weight: bold;
            color: #0f172a;
        }

        /* Progress Bar Graphics inside Table */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }
        .progress-track {
            flex: 1;
            background: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--ethio-green);
            width: 0%;
            transition: width 0.5s ease;
        }
        .percent-text {
            font-size: 13px;
            font-weight: bold;
            color: #334155;
            width: 40px;
        }

        .letters-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 300px;
        }

        .letter-badge {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #e0f2fe;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .empty-badge {
            color: #94a3b8;
            font-size: 13px;
            font-style: italic;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="teacher-container">
        
        <header>
            <div>
                <h1>Teacher Control Panel</h1>
                <p>Real-time enrollment tracking and student progress monitoring</p>
            </div>
            <button class="refresh-btn" onclick="loadTeacherDashboardData()">🔄 Refresh Live Data</button>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Registered Students</h3>
                <p id="statTotalStudents">0</p>
            </div>
            <div class="stat-card">
                <h3>Average Progress</h3>
                <p id="statAvgProgress">0%</p>
            </div>
            <div class="stat-card">
                <h3>Active Learners</h3>
                <p id="statActiveStudents">0</p>
            </div>
        </div>

        <div class="roster-card">
            <h2>Student Enrollment Roster</h2>
            
            <div id="loadingIndicator" class="loading-text">Fetching live roster profiles from Supabase database...</div>
            
            <div id="tableWrapper" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Mastery Progress</th>
                            <th>Mastered Fidel Families</th>
                        </tr>
                    </thead>
                    <tbody id="rosterTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Use the exact same backend targets
        const SUPABASE_URL = "https://muisfipoyzkhznfdvnes.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_VBiJZB8TVM2CSl54aDPP0A_4aDXWb5i";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const totalFidelFamiliesCount = 34; // Total amount of base Amharic families in system

        window.addEventListener('DOMContentLoaded', () => {
            loadTeacherDashboardData();
        });

        async function loadTeacherDashboardData() {
            document.getElementById("loadingIndicator").style.display = "block";
            document.getElementById("tableWrapper").style.display = "none";

            try {
                // 1. Fetch all student profile setups
                const { data: profiles, error: profileErr } = await _supabase
                    .from('profiles')
                    .select('id, display_name, avatar_character');

                if (profileErr) throw profileErr;

                // 2. Fetch all student progress saves
                const { data: progressRecords, error: progressErr } = await _supabase
                    .from('user_progress')
                    .select('user_id, mastered_letters');

                if (progressErr) throw progressErr;

                // Restructuring progress data maps for matching up loops
                const progressMap = {};
                progressRecords.forEach(rec => {
                    progressMap[rec.user_id] = rec.mastered_letters || [];
                });

                renderRoster(profiles || [], progressMap);

            } catch (err) {
                alert("Teacher Portal Error: " + err.message);
                console.error(err);
            }
        }

        function renderRoster(profiles, progressMap) {
            const tbody = document.getElementById("rosterTableBody");
            tbody.innerHTML = "";

            if (profiles.length === 0) {
                document.getElementById("loadingIndicator").innerText = "No student accounts have gone through setup yet.";
                return;
            }

            document.getElementById("loadingIndicator").style.display = "none";
            document.getElementById("tableWrapper").style.display = "block";

            let totalProgressAccumulator = 0;
            let activeCount = 0;

            profiles.forEach(profile => {
                const masteredList = progressMap[profile.id] || [];
                const totalMastered = masteredList.length;
                
                // Calculate percentage based on 34 character system families
                const progressPercent = Math.min(Math.round((totalMastered / totalFidelFamiliesCount) * 100), 100);
                
                totalProgressAccumulator += progressPercent;
                if (totalMastered > 0) activeCount++;

                // Build Table Row Layout Elements
                const row = document.createElement('tr');

                // Column 1: Profile Badge & Name
                const profileCell = document.createElement('td');
                profileCell.className = "student-profile-cell";
                profileCell.innerHTML = `
                    <div class="avatar-circle">${profile.avatar_character || '🦁'}</div>
                    <div>
                        <div class="student-name">${profile.display_name || 'Anonymous Student'}</div>
                    </div>
                `;
                row.appendChild(profileCell);

                // Column 2: Progress Bars
                const progressCell = document.createElement('td');
                progressCell.innerHTML = `
                    <div class="progress-wrapper">
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="percent-text">${progressPercent}%</div>
                    </div>
                `;
                row.appendChild(progressCell);

                // Column 3: Badges for each actual character family mastered
                const lettersCell = document.createElement('td');
                if (totalMastered > 0) {
                    const badgeContainer = document.createElement('div');
                    badgeContainer.className = "letters-badge-container";
                    masteredList.forEach(letter => {
                        badgeContainer.innerHTML += `<span class="letter-badge">${letter}</span>`;
                    });
                    lettersCell.appendChild(badgeContainer);
                } else {
                    lettersCell.innerHTML = `<span class="empty-badge">No letters completed yet</span>`;
                }
                row.appendChild(lettersCell);

                tbody.appendChild(row);
            });

            // Update Header Stats Layout Modules
            document.getElementById("statTotalStudents").innerText = profiles.length;
            document.getElementById("statActiveStudents").innerText = activeCount;
            
            const generalizedAvg = profiles.length > 0 ? Math.round(totalProgressAccumulator / profiles.length) : 0;
            document.getElementById("statAvgProgress").innerText = `${generalizedAvg}%`;
        }
    </script>
</body>
</html>
