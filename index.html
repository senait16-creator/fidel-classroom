<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fidel Classroom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Abyssinica+SIL&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    <div id="toastContainer"></div>

    <div id="authScreen" class="app-card">
        <h1 class="main-title">Fidel Classroom</h1>
        <p class="subtitle" id="authSubtitle">Learn the Amharic Alphabet Together!</p>
        <div id="onboardingGate" class="choice-container">
            <button class="btn-filled-rectangle btn-signup-rect" onclick="selectAuthFlow('signup')">Sign Up</button>
            <button class="btn-filled-rectangle btn-login-rect" onclick="selectAuthFlow('login')">Log In</button>
        </div>
        <div id="credentialFields" style="display: none;">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password (at least 6 characters)">
            <button class="btn-primary" id="mainAuthBtn" onclick="handleAuth()">Let's Go!</button>
            <button class="btn-secondary" onclick="resetToGate()">← Back</button>
        </div>
    </div>

    <div id="adminViewSelectorGate" class="admin-gate-card" style="display: none;">
        <h2 class="main-title" style="font-size:22px;">Welcome, Teacher!</h2>
        <p class="subtitle">Where would you like to go first?</p>
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:16px;">
            <button class="btn-primary" style="background:#475569;" onclick="routeAdminTerminalDirectly('teacher')">Go to Teacher Dashboard</button>
            <button class="btn-primary" onclick="routeAdminTerminalDirectly('student')">Go to Student View</button>
        </div>
    </div>

    <div id="profileSetupScreen" class="app-card" style="display: none;">
        <h2 class="main-title" style="font-size: 22px;">Create Your Profile</h2>
        <input type="text" id="displayName" placeholder="Your Nickname">
        <div class="avatar-grid">
            <div class="avatar-option selected" onclick="selectAvatar('🦁', this)">🦁</div>
            <div class="avatar-option" onclick="selectAvatar('🦅', this)">🦅</div>
            <div class="avatar-option" onclick="selectAvatar('🐆', this)">🐆</div>
            <div class="avatar-option" onclick="selectAvatar('🦊', this)">🦊</div>
            <div class="avatar-option" onclick="selectAvatar('🐘', this)">🐘</div>
        </div>
        <select id="profileTeamSelect"></select>
        <button class="btn-primary" onclick="saveProfileData()">Join the Classroom</button>
    </div>

    <div id="teacherOnlyDashboard" style="display: none;">
        <div class="workspace-title" style="margin-top:20px;">
            <span>Teacher Hub</span>
            <button class="btn-primary" onclick="switchAdminPanelsFromDashboard('student')">Switch to Student View →</button>
        </div>
        <table class="teacher-roster-table">
            <tbody id="teacherRosterTableBody"></tbody>
        </table>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div id="studentDashboard" style="display: none;">
        <div class="dashboard-split-layout">
            <div class="main-workspace-panel" id="mainWorkspace">
                <div id="gameWorkspace">...</div>
                <div id="isolatedFamilyClassroom">...</div>
            </div>
            <div class="sidebar-sticky-panel">
                </div>
        </div>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

    </script>
</body>
</html>
